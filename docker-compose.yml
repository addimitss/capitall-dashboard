services:
  backend:
    build: ./backend
    container_name: aml-backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: aml-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
